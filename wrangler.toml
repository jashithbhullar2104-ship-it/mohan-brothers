# OPTIONAL — only needed if you deploy with the Wrangler CLI.
# If you deploy through the Cloudflare dashboard (recommended, see
# DEPLOY-CLOUDFLARE.md), you do NOT need this file or the CLI.

name = "mohan-brothers"
pages_build_output_dir = "."
compatibility_date = "2024-09-01"

# D1 database binding. After creating the database in the dashboard,
# paste its database_id here (or run: npx wrangler d1 create mohan-brothers).
[[d1_databases]]
binding = "DB"
database_name = "mohan-brothers"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
